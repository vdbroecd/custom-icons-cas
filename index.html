<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAS genesisWorld · Icon Library</title>
<style>
  :root {
    --ha-blue: #03a9f4;
    --ha-blue-dark: #0288d1;
    --ha-surface: #fafafa;
    --ha-card: #ffffff;
    --ha-border: #e0e0e0;
    --ha-text-primary: #212121;
    --ha-text-secondary: #727272;
    --ha-shadow-sm: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
    --ha-shadow-md: 0 3px 6px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);
    --ha-radius: 12px;
    --ha-radius-sm: 8px;
    --ha-radius-xs: 4px;
    --accent: #03a9f4;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --ha-surface: #111111;
      --ha-card: #1c1c1c;
      --ha-border: #2c2c2c;
      --ha-text-primary: #e1e1e1;
      --ha-text-secondary: #9e9e9e;
      --ha-shadow-sm: 0 1px 3px rgba(0,0,0,.4);
      --ha-shadow-md: 0 3px 6px rgba(0,0,0,.35);
    }
  }

  *, *::before, *::after { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--ha-surface);
    color: var(--ha-text-primary);
    margin: 0;
    padding: 0 0 80px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ───────────────────────────────────────────── */
  .header {
    background: var(--ha-card);
    border-bottom: 1px solid var(--ha-border);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--ha-shadow-sm);
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 60px;
  }
  .header-logo {
    height: 32px;
    width: auto;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ha-text-primary);
    white-space: nowrap;
  }
  .header-title span {
    color: var(--ha-blue);
  }
  .header-spacer { flex: 1; }
  .header-meta {
    font-size: 12px;
    color: var(--ha-text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .pill-count {
    background: var(--ha-blue);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    line-height: 1.6;
  }

  /* ── TOOLBAR ──────────────────────────────────────────── */
  .toolbar {
    background: var(--ha-card);
    border-bottom: 1px solid var(--ha-border);
    padding: 0 20px;
  }
  .toolbar-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 56px;
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
    max-width: 380px;
  }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ha-text-secondary);
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%;
    height: 36px;
    background: var(--ha-surface);
    border: 1px solid var(--ha-border);
    border-radius: var(--ha-radius-sm);
    padding: 0 12px 0 36px;
    font-size: 14px;
    color: var(--ha-text-primary);
    outline: none;
    transition: border-color .15s;
    -webkit-appearance: none;
  }
  .search-wrap input::placeholder { color: var(--ha-text-secondary); }
  .search-wrap input:focus { border-color: var(--ha-blue); }
  .search-wrap input::-webkit-search-cancel-button { display: none; }

  .clear-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ha-text-secondary);
    padding: 2px;
    line-height: 1;
    display: none;
  }
  .clear-btn.visible { display: block; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0 14px;
    height: 36px;
    border: 1px solid var(--ha-border);
    border-radius: var(--ha-radius-sm);
    background: var(--ha-card);
    color: var(--ha-text-primary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    white-space: nowrap;
    text-decoration: none;
  }
  .btn:hover { background: var(--ha-surface); border-color: var(--ha-blue); }
  .btn svg { flex-shrink: 0; }
  .btn-primary {
    background: var(--ha-blue);
    border-color: var(--ha-blue-dark);
    color: #fff;
  }
  .btn-primary:hover { background: var(--ha-blue-dark); border-color: var(--ha-blue-dark); }

  #noResults {
    display: none;
    max-width: 1280px;
    margin: 60px auto;
    text-align: center;
    color: var(--ha-text-secondary);
    font-size: 15px;
    padding: 0 20px;
  }
  #noResults svg { display: block; margin: 0 auto 16px; opacity: .3; }

  /* ── MAIN CONTENT ─────────────────────────────────────── */
  .main {
    max-width: 1280px;
    margin: 24px auto 0;
    padding: 0 20px;
  }

  .group-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ha-text-secondary);
    padding: 0 0 10px;
    border-bottom: 1px solid var(--ha-border);
    margin: 0 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .group-label-count {
    font-weight: 500;
    font-size: 11px;
    background: var(--ha-surface);
    border: 1px solid var(--ha-border);
    border-radius: 20px;
    padding: 1px 8px;
    color: var(--ha-text-secondary);
    letter-spacing: 0;
    text-transform: none;
  }

  .group-section { margin: 0 0 32px; }

  .icon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
  }

  .icon-item {
    background: var(--ha-card);
    border: 1px solid var(--ha-border);
    border-radius: var(--ha-radius-sm);
    padding: 12px 8px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: border-color .12s, box-shadow .12s, transform .1s;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
  }
  .icon-item:hover {
    border-color: var(--ha-blue);
    box-shadow: var(--ha-shadow-md);
    transform: translateY(-1px);
    z-index: 1;
  }
  .icon-item:focus-visible {
    outline: 2px solid var(--ha-blue);
    outline-offset: 2px;
  }
  .icon-item:active { transform: translateY(0); }

  .icon-thumb-wrap {
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--ha-radius-xs);
    overflow: hidden;
    flex-shrink: 0;
    padding: 5px;
  }
  .icon-thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .icon-name {
    font-size: 10px;
    color: var(--ha-text-secondary);
    text-align: center;
    line-height: 1.3;
    word-break: break-word;
    overflow-wrap: anywhere;
    max-width: 88px;
  }

  /* ── MODAL OVERLAY ────────────────────────────────────── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 900;
    justify-content: center;
    align-items: center;
    padding: 16px;
    backdrop-filter: blur(2px);
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--ha-card);
    border-radius: var(--ha-radius);
    padding: 28px 28px 24px;
    width: 100%;
    max-width: 420px;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    animation: modal-in .15s ease;
  }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(.95) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ha-text-secondary);
    padding: 4px;
    line-height: 1;
    border-radius: var(--ha-radius-xs);
    transition: background .1s;
  }
  .modal-close:hover { background: var(--ha-surface); }

  .modal-icon-wrap {
    width: 100px;
    height: 100px;
    margin: 0 auto 20px;
    border-radius: var(--ha-radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .modal-icon-wrap img { width: 100%; height: 100%; object-fit: contain; }

  .modal-filename {
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    word-break: break-all;
    margin: 0 0 6px;
  }
  .modal-hex {
    font-size: 12px;
    text-align: center;
    color: var(--ha-text-secondary);
    font-family: "SF Mono", "Fira Code", monospace;
    margin: 0 0 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .hex-swatch {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 2px;
    border: 1px solid rgba(0,0,0,.15);
    vertical-align: middle;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
  }
  .modal-actions .btn { flex: 1; justify-content: center; }

  /* ── GIT LOG MODAL ────────────────────────────────────── */
  .git-modal {
    max-width: 560px;
  }
  .git-modal h2 {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 16px;
    color: var(--ha-text-primary);
  }
  .commit-list {
    list-style: none;
    padding: 0;
    margin: 0;
    max-height: 380px;
    overflow-y: auto;
    overscroll-behavior: contain;
  }
  .commit-list::-webkit-scrollbar { width: 4px; }
  .commit-list::-webkit-scrollbar-thumb { background: var(--ha-border); border-radius: 4px; }

  .commit-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--ha-border);
    font-size: 13px;
  }
  .commit-item:last-child { border-bottom: none; }
  .commit-msg {
    font-weight: 500;
    color: var(--ha-text-primary);
    margin: 0 0 4px;
    line-height: 1.4;
  }
  .commit-meta {
    color: var(--ha-text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .commit-author { font-weight: 500; }
  .commit-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--ha-border);
    display: inline-block;
  }
  .commit-link {
    color: var(--ha-blue);
    text-decoration: none;
    font-size: 12px;
  }
  .commit-link:hover { text-decoration: underline; }

  /* ── LOADING / EMPTY STATES ───────────────────────────── */
  .loading-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
    margin-bottom: 32px;
  }
  .skeleton {
    background: var(--ha-card);
    border: 1px solid var(--ha-border);
    border-radius: var(--ha-radius-sm);
    height: 110px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .45; }
  }

  /* ── TOAST ────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 88px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #212121;
    color: #fff;
    font-size: 13px;
    padding: 9px 18px;
    border-radius: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 1000;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── FOOTER ───────────────────────────────────────────── */
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: var(--ha-card);
    border-top: 1px solid var(--ha-border);
    padding: 12px 20px;
    text-align: center;
    font-size: 12px;
    color: var(--ha-text-secondary);
    z-index: 50;
  }

  /* ── MOBILE ───────────────────────────────────────────── */
  @media (max-width: 600px) {
    .header-title { font-size: 14px; }
    .toolbar-inner { height: auto; padding: 10px 0; gap: 8px; }
    .search-wrap { max-width: 100%; }
    .icon-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
    .modal { padding: 20px 16px 18px; }
    .modal-icon-wrap { width: 80px; height: 80px; }
    .modal-actions { flex-direction: column; }
    .btn { font-size: 13px; }
    .git-modal { max-width: 100%; }
  }
  @media (max-width: 400px) {
    .header-meta { display: none; }
    .icon-grid { grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 8px; }
  }
</style>
</head>

<script>
const iconBasePath = "icons";
let allIcons = {};

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function getBgColor(iconName) {
  const hexMatch = iconName.match(/64 ([A-Fa-f0-9]{6})/);
  if (hexMatch) return "#" + hexMatch[1];
  if (iconName.includes(" 64") || iconName.toLowerCase().includes("dashboard")) return "#555555";
  return "white";
}

function renderGroups(groupedIcons) {
  const container = document.getElementById("groupContainer");
  container.innerHTML = "";
  const groups = Object.keys(groupedIcons).sort();

  groups.forEach(group => {
    const icons = groupedIcons[group];
    const section = document.createElement("section");
    section.classList.add("group-section");
    section.dataset.group = group;

    const label = document.createElement("div");
    label.className = "group-label";
    label.innerHTML = `<span>${escHtml(group)}</span><span class="group-label-count">${icons.length}</span>`;
    section.appendChild(label);

    const grid = document.createElement("div");
    grid.className = "icon-grid";
    grid.setAttribute("role", "list");

    icons.sort((a, b) => {
      if (a.includes("64") && !b.includes(" 64")) return -1;
      if (!a.includes(" 64") && b.includes("64")) return 1;
      return a.localeCompare(b);
    }).forEach(iconName => {
      const iconPath = `https://vdbroecd.github.io/custom-icons-cas/${iconBasePath}/${encodeURIComponent(iconName)}`;
      const bgColor = getBgColor(iconName);
      const displayName = iconName.replace(/\.[^.]+$/, "").replace("icon_", "");

      const item = document.createElement("button");
      item.className = "icon-item";
      item.setAttribute("role", "listitem");
      item.setAttribute("aria-label", `${displayName} — klik om te openen`);
      item.dataset.iconname = iconName.toLowerCase();
      item.onclick = () => openPopup(iconPath, iconName, bgColor);

      item.innerHTML = `
        <div class="icon-thumb-wrap" style="background:${escHtml(bgColor)};">
          <img src="${escHtml(iconPath)}" alt="" loading="lazy">
        </div>
        <span class="icon-name">${escHtml(displayName)}</span>
      `;
      grid.appendChild(item);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

async function loadIcons() {
  try {
    const response = await fetch(`https://api.github.com/repos/vdbroecd/custom-icons-cas/contents/${iconBasePath}`);
    if (!response.ok) throw new Error("GitHub API fout: " + response.status);
    const files = await response.json();

    let totalFiles = 0;
    files.forEach(file => {
      if (!file.name.endsWith(".svg") && !file.name.endsWith(".png")) return;
      totalFiles++;
      const parts = file.name.replace("icon_", "").split(" ");
      const groupName = parts[0];
      if (!allIcons[groupName]) allIcons[groupName] = [];
      allIcons[groupName].push(file.name);
    });

    document.getElementById("iconCount").textContent = totalFiles;
    document.getElementById("loadingState").style.display = "none";
    renderGroups(allIcons);
  } catch (err) {
    document.getElementById("loadingState").innerHTML =
      `<p style="text-align:center;color:var(--ha-text-secondary);padding:40px 20px;">Fout bij laden: ${escHtml(err.message)}</p>`;
    console.error(err);
  }
}

function searchIcons() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  const clearBtn = document.getElementById("clearBtn");
  clearBtn.classList.toggle("visible", q.length > 0);

  let totalVisible = 0;
  document.querySelectorAll(".group-section").forEach(section => {
    let sectionVisible = 0;
    section.querySelectorAll(".icon-item").forEach(item => {
      const match = !q || item.dataset.iconname.includes(q);
      item.style.display = match ? "" : "none";
      if (match) sectionVisible++;
    });
    section.style.display = sectionVisible > 0 ? "" : "none";
    totalVisible += sectionVisible;
    const countEl = section.querySelector(".group-label-count");
    if (countEl) countEl.textContent = sectionVisible;
  });

  const noResults = document.getElementById("noResults");
  noResults.style.display = totalVisible === 0 && q ? "block" : "none";
  document.getElementById("searchTerm").textContent = q;
}

function clearSearch() {
  document.getElementById("searchInput").value = "";
  searchIcons();
  document.getElementById("searchInput").focus();
}

function openPopup(imagePath, iconName, hexColor) {
  const popup = document.getElementById("popup");
  document.getElementById("popupImage").src = imagePath;
  document.getElementById("popupImage").alt = iconName;
  document.getElementById("popupTitle").textContent = iconName;
  document.getElementById("popupIconWrap").style.background = hexColor;

  const isWhite = hexColor === "white" || hexColor === "#ffffff";
  if (isWhite) {
    document.getElementById("popupIconWrap").style.border = "1px solid var(--ha-border)";
  } else {
    document.getElementById("popupIconWrap").style.border = "none";
  }

  const hexEl = document.getElementById("popupHex");
  if (hexColor && hexColor !== "white") {
    hexEl.innerHTML = `<span class="hex-swatch" style="background:${escHtml(hexColor)};"></span>${escHtml(hexColor)}`;
  } else {
    hexEl.textContent = "";
  }

  document.getElementById("copyHexBtn").style.display = hexColor && hexColor !== "white" ? "" : "none";
  document.getElementById("copyHexBtn").onclick = () => {
    navigator.clipboard.writeText(hexColor).then(() => showToast("Hex-code gekopieerd"));
  };

  document.getElementById("downloadBtn").onclick = () => {
    const link = document.createElement("a");
    link.href = imagePath;
    link.download = iconName;
    link.click();
    showToast("Download gestart");
  };

  popup.classList.add("open");
  document.body.style.overflow = "hidden";
  document.getElementById("popupTitle").focus();
}

function closePopup() {
  document.getElementById("popup").classList.remove("open");
  document.body.style.overflow = "";
}

function handleOverlayClick(e, id) {
  if (e.target === document.getElementById(id)) {
    if (id === "popup") closePopup();
    else closeGitModal();
  }
}

function closeGitModal() {
  document.getElementById("gitModal").classList.remove("open");
  document.body.style.overflow = "";
}

function openGitModal() {
  document.getElementById("gitModal").classList.add("open");
  document.body.style.overflow = "hidden";
  fetchGitCommits();
}

async function fetchGitCommits() {
  const list = document.getElementById("commit-list");
  list.innerHTML = '<li class="commit-item"><span class="commit-msg">Laden…</span></li>';
  try {
    const res = await fetch("https://api.github.com/repos/vdbroecd/custom-icons-cas/commits");
    if (!res.ok) throw new Error("Status " + res.status);
    const commits = await res.json();
    const opts = { day:"2-digit", month:"long", year:"numeric", hour:"2-digit", minute:"2-digit" };
    list.innerHTML = commits.map(c => {
      const date = new Date(c.commit.author.date).toLocaleDateString("nl-NL", opts);
      return `<li class="commit-item">
        <p class="commit-msg">${escHtml(c.commit.message.split("\n")[0])}</p>
        <div class="commit-meta">
          <span class="commit-author">${escHtml(c.commit.author.name)}</span>
          <span class="commit-dot"></span>
          <span>${escHtml(date)}</span>
          <span class="commit-dot"></span>
          <a href="${escHtml(c.html_url)}" target="_blank" rel="noopener" class="commit-link">Bekijk →</a>
        </div>
      </li>`;
    }).join("");
  } catch(e) {
    list.innerHTML = `<li class="commit-item"><span class="commit-msg" style="color:var(--ha-text-secondary)">Kan commits niet laden: ${escHtml(e.message)}</span></li>`;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") { closePopup(); closeGitModal(); }
  if ((e.ctrlKey||e.metaKey) && e.key === "k") {
    e.preventDefault();
    document.getElementById("searchInput").focus();
    document.getElementById("searchInput").select();
  }
});

loadIcons();
</script>
</body>
</html>
